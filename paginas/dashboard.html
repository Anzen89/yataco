<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body class="bg-light">

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 bg-dark text-white min-vh-100 p-3">

            <h2>Panel</h2>

            <ul class="nav flex-column mt-4">

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Usuarios</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Pedidos</a>
                </li>

            </ul>

        </div>

        <!-- Contenido -->
        <div class="col-md-10 p-4">

            <h1>Dashboard</h1>

            <div class="row mt-4">

                <div class="col-md-4">

                    <div class="card shadow">

                        <div class="card-body">

                            <h5>Usuarios</h5>
                            <h2>150</h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card shadow">

                        <div class="card-body">

                            <h5>Ventas</h5>
                            <h2>$2500</h2>

                        </div>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="card shadow">

                        <div class="card-body">

                            <h5>Pedidos</h5>
                            <h2>45</h2>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
